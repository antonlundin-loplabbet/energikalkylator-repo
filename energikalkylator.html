// ─── PRODUKTKATEGORIER ──────────────────────────────────────────────────────
// Klassificerar produkter via namnmatchning så vi kan visa rätt sak på rätt
// plats (innan / under / efter / boost). Stödjer alla tre huvudmärken.

  pre_drink: {

    typical_carbs: 30,

  },

      /(caf|koffein).{0,40}(u gel|sport gel|liquid gel|^gel | gel )/i,

// Tillbehör som inte är energiprodukter — flaskor, väskor, bälten etc.
// "Soft Flask Gel 150ml" är t.ex. en gelflaska, inte en gel.
// (OBS: "pack" och "sleeve" hanteras av MULTIPACK_RX nedan, inte här —
//  ett "20-pack" gels är fortfarande gels, bara med lägre rekommendationsprio.)
const ACCESSORY_RX = /\b(soft.?flask|softflask|flaska|bottle|vattenflaska|löparbälte|midjebälte|springbelt|gelbälte|nutrition.?belt|belt|västs?|vest|h[åa]llare|holder|behållare|bälte|påse)\b/i;

// Multi-pack-indikatorer — föredrar singelförpackningar i rekommendationer.
// Box/kartonger/flerpack är prisvärda men "tråkiga" som inspirerande
// produktrekommendation till någon som planerar ett enskilt lopp.
const MULTIPACK_RX = /\b(box|kartong|carton|flerpack|multipack|\d+\s*[-]?\s*pack|\d+\s*pack|pack\s*\d+|10[\s-]?st|12[\s-]?st|16[\s-]?st|20[\s-]?st|24[\s-]?st|10er|12er|20er|sleeve)\b/i;

function isAccessory(name) {
  return ACCESSORY_RX.test(name || "");
}

function isMultiPack(name) {
  return MULTIPACK_RX.test(name || "");
}

function classifyProduct(name) {
  const n = name || "";
  // Tillbehör först — annars matchar t.ex. "Soft Flask Gel" som energigel
  if (isAccessory(n)) return null;
  // Specialfall: "U Salty Bar" är en bar (mat), inte en electrolyte (salt-tablett).
  // Måste fångas innan electrolyte-regex annars blir det fel.
  if (/salty bar/i.test(n)) return "bar";
  // Specialfall: "Pre Sport GEL" är en energigel som råkar bära Pre Sport-namnet.
  // Det är inte samma produkt som "Presport Cola" (pulvermix för carb-loading).
  // Båda matchar pre_drink-regex annars, så den här specialklausulen sorterar
  // gel-varianten till rätt typ — användaren får då Presport Cola på pre-rollen.
  if (/pre.?sport.{0,5}gel/i.test(n)) return "gel";
  // Ordningen spelar roll, testa specifika först
  const order = ["bicarb", "itc", "beetroot", "electrolyte", "recovery", "pre_drink", "gel_caf", "drink_mix", "bar", "chew", "gel"];
  for (const t of order) {
    if (PRODUCT_TYPES[t].matches.some(rx => rx.test(n))) return t;
  }
  return null;
}

function applyUrlOverride(product) {
  const byBrand = URL_OVERRIDES[product.type];
  if (byBrand && byBrand[product.brand]) {

  return product;
}

// ─── BERÄKNINGSMOTOR ────────────────────────────────────────────────────────
// Bygger på etablerad sportnutritionsforskning:
//  - Cunningham (1980) för basal energi (mer pålitlig för idrottare än Harris-Benedict)
//  - Boer-formel för LBM-uppskattning
//  - Margaria/ACSM för löpekonomi (~1 kcal/kg/km)
//  - Substratutnyttjande från Romijn et al. + könsskillnader (kvinnor mer fett)
//  - Kolhydratrekommendationer enligt Jeukendrup, Burke & Hawley

function estimateLBM(weight, height, sex) {
  // Boer-formel - bra approximation utan kroppsfettsmätning
  if (sex === "man") return (0.407 * weight) + (0.267 * height) - 19.2;
  return (0.252 * weight) + (0.473 * height) - 48.3;
}

function bmr(lbm) {
  // Cunningham: BMR = 500 + 22 × LBM
  return 500 + 22 * lbm;
}

// Energi­kostnad för löpning per kg per km
// Vid normal fart: ca 1 kcal/kg/km. Något högre vid mycket långsam/snabb fart
function energyCostPerKgKm(speed_mps) {
  // ACSM-baserad approximation, ger ~0.95-1.10 kcal/kg/km
  const v = Math.max(2.0, Math.min(6.0, speed_mps));
  return 0.95 + 0.04 * Math.abs(v - 3.5);
}

// Uppskatta intensitet (% av VO2max) baserat på distans + relativ fart
// Längre lopp = lägre genomsnittlig intensitet
function estimateIntensity(distance_km, time_min, weight, experience) {
  const speed_mps = (distance_km * 1000) / (time_min * 60);
  // Bas-intensitet utifrån distans (typiska %VO2max för välltränade)
  let baseInt;
  if (distance_km <= 5) baseInt = 0.92;
  else if (distance_km <= 10) baseInt = 0.87;
  else if (distance_km <= 21.1) baseInt = 0.82;
  else if (distance_km <= 30) baseInt = 0.78;
  else if (distance_km <= 42.2) baseInt = 0.75;
  else if (distance_km <= 80) baseInt = 0.65;
  else baseInt = 0.58;
  // Justera lite efter erfarenhet (avancerad håller högre %VO2max längre)
  if (experience === "avancerad") baseInt += 0.02;
  else if (experience === "nyborjare") baseInt -= 0.03;
  return Math.max(0.5, Math.min(0.95, baseInt));
}

// Andel av energin som kommer från kolhydrater vid given intensitet
function carbFraction(intensity, sex) {
  // Linjär interpolering: 50% VO2max → ~35% carb, 95% VO2max → ~95% carb
  let frac = 0.30 + (intensity - 0.5) * 1.45;
  // Kvinnor använder något mer fett (~5% lägre kolhydratandel vid samma intensitet)
  if (sex === "kvinna") frac -= 0.04;
  return Math.max(0.25, Math.min(0.95, frac));
}

// Rekommenderat kolhydratintag per timme under loppet
function carbsPerHourTarget(time_min, experience, sex) {
  const t = time_min / 60;
  let target;
  if (t < 0.5) target = 0;             // <30 min: vatten räcker
  else if (t < 0.75) target = 20;      // 30-45 min: lite gärna men inte krav
  else if (t < 1.25) target = 40;      // 45-75 min: 30-60 g/h
  else if (t < 2.0) target = 65;       // 75-120 min: 60-75 g/h (en transportör)
  else if (t < 2.75) target = 85;      // 2-2,75h: börja med dubbla källor
  else if (t < 4.5) target = 95;       // halv-/maraton-territorium: 90+
  else if (t < 7.0) target = 80;       // ultra: lite lägre, mer fett-tolerant
  else target = 70;                    // mycket långa ultra
  // Justera för erfarenhet (tränad mage tål mer)
  if (experience === "nyborjare") target *= 0.75;
  else if (experience === "avancerad") target *= 1.10;
  // Kvinnor brukar tolerera marginellt lägre toppar
  if (sex === "kvinna") target *= 0.97;
  // Avrunda till närmsta 5
  return Math.round(target / 5) * 5;
}

// Formaterar minuter till läsbar svensk tid: "1 timme", "2 timmar", "1 h 8 minuter"
function formatTime(minutes) {
  const total = Math.round(minutes);
  const h = Math.floor(total / 60);
  const m = total - h * 60;
  if (h === 0) return `${m} minuter`;
  if (m === 0) return h === 1 ? "1 timme" : `${h} timmar`;
  return `${h} h ${m} minuter`;
}

// Vätskebehov per timme (ml) - grov uppskattning baserad på vikt + intensitet
function fluidPerHour(weight, intensity) {
  // 6-10 ml/kg/h vid normal löpning, högre vid värme/intensitet
  const base = weight * 7;
  const intensityFactor = 0.7 + intensity * 0.6;
  const ml = base * intensityFactor;
  // Avrunda till närmsta 50
  return Math.round(ml / 50) * 50;
}

// Salt/natrium per timme (mg) - genomsnitt ca 500-700 mg/L svett, men varierar 300-1500
function sodiumPerHour(weight, intensity) {
  const fluid_l = fluidPerHour(weight, intensity) / 1000;
  return Math.round(fluid_l * 600);
}

// Pre-race kolhydratladdning (totalt g/dag senaste 1-3 dagarna)
function carbLoadGrams(weight, distance_km) {
  if (distance_km < 21.1) return null; // Inte nödvändigt under halvmara
  const gPerKg = distance_km >= 30 ? 10 : 8;
  return Math.round(weight * gPerKg);
}

// Pre-race måltid 3-4h innan
function preRaceMealCarbs(weight, distance_km) {
  // 1-3 g/kg är vanligt; korta lopp lägre, längre högre
  let gPerKg;
  if (distance_km < 10) gPerKg = 1.0;
  else if (distance_km < 21.1) gPerKg = 1.5;
  else gPerKg = 2.0;
  return Math.round(weight * gPerKg);
}

// Återhämtning första 30 min: 1-1,2 g kolhydrater/kg + 0,3 g protein/kg
function recoveryCarbs(weight) { return Math.round(weight * 1.1); }
function recoveryProtein(weight) { return Math.round(weight * 0.3); }

// ─── HUVUDBERÄKNING ─────────────────────────────────────────────────────────
function calculatePlan(input) {
  const { sex, age, weight, height, distance, timeMin, experience, brand, boosters } = input;
  const time_h = timeMin / 60;
  const speed_mps = (distance * 1000) / (timeMin * 60);
  const pace_min_per_km = timeMin / distance;
  
  const lbm = estimateLBM(weight, height, sex);
  const restingBMR = bmr(lbm);
  const intensity = estimateIntensity(distance, timeMin, weight, experience);
  const ecPerKgKm = energyCostPerKgKm(speed_mps);
  const totalKcal = Math.round(weight * distance * ecPerKgKm);
  const carbFrac = carbFraction(intensity, sex);
  const carbKcal = Math.round(totalKcal * carbFrac);
  const fatKcal = totalKcal - carbKcal;
  const carbGrams = Math.round(carbKcal / 4);
  const fatGrams = Math.round(fatKcal / 9);
  
  const carbsHr = carbsPerHourTarget(timeMin, experience, sex);
  const totalCarbsIntake = Math.round(carbsHr * time_h);
  const fluidHr = fluidPerHour(weight, intensity);
  const sodiumHr = sodiumPerHour(weight, intensity);
  
  const carbLoad = carbLoadGrams(weight, distance);
  const preMeal = preRaceMealCarbs(weight, distance);
  const recCarbs = recoveryCarbs(weight);
  const recProt = recoveryProtein(weight);
  
  // Glykogenlager (300-500g lagrat hos vältränad person, ~weight*4.5g)
  // Används för informationstexten längst ner — själva intagsplanen
  // är redan optimerad för att inte tömma lagren.
  const glycogenStores = Math.round(weight * 4.5);
  
  return {
    // Person
    lbm: Math.round(lbm * 10) / 10,
    restingBMR: Math.round(restingBMR),
    // Lopp
    distance, timeMin, time_h, pace_min_per_km, speed_mps, intensity,
    // Energi
    totalKcal, carbKcal, fatKcal, carbGrams, fatGrams, carbFrac,
    // Intag
    carbsHr, totalCarbsIntake, fluidHr, sodiumHr,
    // Pre/post
    carbLoad, preMeal, recCarbs, recProt,
    // Glykogen
    glycogenStores,
    // User input
    sex, age, weight, height, experience, brand, boosters,
  };
}

// Tar fram konkret förslag baserat på beräkning + märkesönskemål

  // Filter på märke
  const filterByBrand = (list) => {

    if (brand === "maurten") return list.filter(p => p.brand === "Maurten");
    if (brand === "enervit") return list.filter(p => p.brand === "Enervit");
    return list;
  };
  
  const inStock = products.filter(p => p.inStock !== false);
  
  // Singel-förpackningar först — som rekommendation är en enskild gel mer
  // "levande" och inspirerande än en kartong med 20 st.
  const singleFirst = (a, b) => {
    const am = isMultiPack(a.name), bm = isMultiPack(b.name);
    if (am !== bm) return am ? 1 : -1;
    return 0;
  };
  const inStockSorted = [...inStock].sort(singleFirst);
  const allByBrand = filterByBrand(inStockSorted);
  
  // Hjälpare: hämta första produkt av en typ.
  // Logik:
  //  1. Om användaren valt ett specifikt märke och det märket har produkten
  //     i den efterfrågade typen → använd den.
  //  2. Annars: använd typ-specifik prio från PREFERRED_BY_TYPE så vi alltid
  //     rekommenderar t.ex. Umara U Salty på electrolyte, Maurten på bicarb,
  //     etc. Det ger automatiskt en bra mix av märken över hela planen.
  //  3. Sista fallback: vilken produkt som helst av rätt typ.
  // Om typen har en AVOID_PATTERN så undviker vi produkter med det mönstret
  // i namnet (t.ex. "Pre Sport GEL" på pre_drink-rollen).
  const pick = (type) => {
    const avoidRx = AVOID_PATTERNS[type];
    const okName = (p) => !avoidRx || !avoidRx.test(p.name);
    const findOk = (arr) => arr.find(okName) || arr[0];
    
    // 1. Användarens valda brand
    if (allByBrand.length < inStockSorted.length) {
      const inBrandCands = allByBrand.filter(p => p.type === type);
      if (inBrandCands.length) return findOk(inBrandCands);
    }
    // 2. Typ-specifik prio
    const pref = PREFERRED_BY_TYPE[type] || BRAND_PRIORITY;
    for (const brand of pref) {
      const cands = inStockSorted.filter(p => p.type === type && p.brand === brand);
      if (cands.length) return findOk(cands);
    }
    // 3. Vad som helst av rätt typ
    const all = inStockSorted.filter(p => p.type === type);
    return all.length ? findOk(all) : undefined;
  };
  const pickAll = (type) => allByBrand.filter(p => p.type === type);
  
  // ── INNAN ──
  // Varje item får en sortKey = ungefärlig starttid i minuter före loppet.
  // Beforeplanen sorteras sedan så att tidigast aktivitet kommer först.
  const beforePlan = [];
  // Kolhydratladdning (>halv-mara)
  if (plan.carbLoad) {
    // Förslå sportdryckspulver som enkelt komplement till maten.
    // VIKTIGT: vi ska INTE rekommendera koffein-versioner under laddningen
    // (Maurten Drink Mix 320 CAF 100). Filtrera bort både caf och koffein.
    const isCafFree = (p) => !/caf|koffein/i.test(p.name) && !p.caf;
    const isLoadingDrink = (p) => p.type === "drink_mix" && /320|loader/i.test(p.name);
    const loadingDrink = allByBrand.find(p => isLoadingDrink(p) && isCafFree(p))
                       || inStockSorted.find(p => isLoadingDrink(p) && isCafFree(p))
                       || allByBrand.find(p => p.type === "drink_mix" && isCafFree(p))
                       || inStockSorted.find(p => p.type === "drink_mix" && isCafFree(p));
    beforePlan.push({
      sortKey: 4320, // 3 dagar
      timing: "1-3 dagar före",
      heading: "Kolhydratladdning",
      detail: `Sikta på ${plan.carbLoad}g kolhydrater per dag (vanlig mat: pasta, ris, bröd, frukt). Det fyller dina glykogendepåer maximalt. Tips: en sportdryck som ${loadingDrink ? loadingDrink.name : "Maurten Drink Mix 320"} är ett enkelt sätt att komplettera maten, speciellt sista dagarna när magen ändå inte vill ha mer fast föda.`,
      product: loadingDrink,

  }
  // Beetroot generisk (om vald)
  if (boosters.includes("beetroot")) {
    const beet = pick("beetroot");
    beforePlan.push({
      sortKey: 7200, // 5 dagar (laddning startar tidigast av allt)
      timing: "Sista intag 2,5h före start (ev. ladda 4-7 dagar innan)",
      heading: "Rödbetsshot (nitrat)",
      detail: "Nitrat förbättrar löpekonomin och kan ge 1-3% prestationsökning. Drick din shot ca 2,5 timmar före start. För maximerad effekt kan du buffra med 1 shot/dag i 4-7 dagar inför tävlingen. Tips: undvik att spotta de sista timmarna före start, det avbryter omvandlingen från nitrat till kväveoxid i munnen.",
      product: beet,
    });
  }
  // Måltid
  beforePlan.push({
    sortKey: 240, // 4 timmar
    timing: "3-4 timmar före",
    heading: "Pre-race måltid",
    detail: `Sikta på ca ${plan.preMeal}g lättsmälta kolhydrater. Klassiker: havregrynsgröt med banan + honung, vitt bröd med marmelad, eller riskaka med jordnötssmör. Drick 5-7 ml vätska per kg (${Math.round(plan.weight * 6)} ml) under förmiddagen.`,
    product: null,
  });
  // Nomio (akut effekt, tas 2-3h innan)
  if (boosters.includes("nomio")) {
    const nomio = allByBrand.find(p => p.id === "160657501")
               || inStock.find(p => p.id === "160657501")
               || allByBrand.find(p => /nomio/i.test(p.brand))
               || inStock.find(p => /nomio/i.test(p.brand))
               || FALLBACK_PRODUCTS.find(p => p.id === "nomio-shot");
    beforePlan.push({
      sortKey: 180, // 3 timmar
      timing: "2-3h före start",
      heading: "Nomio prestationsshot",
      detail: "Svensk shot baserad på isotiocyanater (ITC) från ekologiska broccoligroddar. Forskning från Karolinska och GIH visar minskad mjölksyrauppbyggnad och skydd mot oxidativ stress vid intensiv aktivitet. Effekten är akut, ta en flaska 2-3 timmar före start. Skonsam för magen.",

  }
  // Bicarb (om vald + tillräckligt experience)
  if (boosters.includes("bicarb")) {

    beforePlan.push({
      sortKey: 90, // 60-90 min
      timing: "60-90 min före start",

    const isElitePush = plan.experience === "avancerad" && time_h <= 2 && plan.distance <= 21.1;

    if (brandPreDrink) {
      preProduct = brandPreDrink;

    } else if (time_h < 3.5) {
      // Maraton: dryck + 4-6 gels (varav 1-2 koffein)
      drinkCarbs = Math.round(totalNeeded * 0.45);
      const gelTotal = Math.round(totalNeeded * 0.55 / (gel?.carbs || 25));
      gelCafCount = Math.min(2, Math.floor(gelTotal / 3));
      gelCount = gelTotal - gelCafCount;
    } else {
      // Ultra: dryck + gels + bars
      drinkCarbs = Math.round(totalNeeded * 0.4);
      barCount = Math.round((totalNeeded * 0.25) / (bar?.carbs || 30));
      const gelTotal = Math.round((totalNeeded * 0.35) / (gel?.carbs || 25));
      gelCafCount = Math.min(3, Math.floor(gelTotal / 4));
      gelCount = gelTotal - gelCafCount;
    }
    
    const items = [];
    if (drinkCarbs > 0 && drinkMix) {
      // Säkra mot saknad/null carbs (kan hända om API-data är ofullständig).
      // Faller då tillbaka till typiskt värde för drink_mix (40g/portion).
      const carbsPerPortion = drinkMix.carbs && drinkMix.carbs > 0 ? drinkMix.carbs : 40;
      const portions = Math.ceil(drinkCarbs / carbsPerPortion);
      items.push({
        product: drinkMix,
        amount: `${portions} portion${portions > 1 ? "er" : ""}`,
        carbs: portions * carbsPerPortion,
        note: drinkMix.brand === "Maurten" 
          ? `Blanda i ${portions * 500} ml vatten, drick jämnt under loppet (~${Math.round(plan.fluidHr)} ml/h)`
          : `Blanda ${portions} skopor i ${portions * 250} ml vatten eller motsvarande`,
      });
    }
    if (gelCount > 0 && gel) {
      const gelCarbs = gel.carbs && gel.carbs > 0 ? gel.carbs : 25;
      items.push({
        product: gel,
        amount: `${gelCount} st`,
        carbs: gelCount * gelCarbs,
        note: `Ta en gel var ${Math.round((time_h * 60) / Math.max(1, gelCount + gelCafCount))} min`,
      });
    }
    if (gelCafCount > 0 && gelCaf) {
      const gelCafCarbs = gelCaf.carbs && gelCaf.carbs > 0 ? gelCaf.carbs : 25;
      // Koffein behöver 20-30 min för full effekt — anpassa rådet efter lopplängd.
      let cafNote;
      if (time_h < 1.5) {
        cafNote = `Koffein behöver 20-30 min för full effekt. Ta din första koffein-gel direkt vid start (eller 15-30 min innan) så hinner den ge effekt under loppet.`;
      } else if (time_h < 3) {
        cafNote = `Ta din första koffein-gel tidigt, efter ⅓ av loppet eller direkt vid start om du vill ha boost från första kilometern. Effekten kommer efter 20-30 min.`;
      } else {
        cafNote = `Ta första koffein-gelen vid halvtid eller något tidigare så peakar effekten under loppets tuffaste del. Spara gärna en till sista kvarten.`;
      }
      items.push({
        product: gelCaf,
        amount: `${gelCafCount} st`,
        carbs: gelCafCount * gelCafCarbs,
        note: cafNote,
      });
    }
    if (barCount > 0 && bar) {
      // På långa ultralopp (4h+) lider många av smak-/textur-trötthet.
      // Om användaren inte valt ett specifikt märke och vi har bars från
      // flera märken: splittra mängden över två olika märken så det blir
      // variation på smak och konsistens längs loppet.
      const userPickedBrand = allByBrand.length < inStockSorted.length;
      let barProducts = [bar];
      if (!userPickedBrand && time_h >= 4 && barCount >= 2) {
        // Hitta en alternativ bar från ett annat märke
        const altBar = inStockSorted.find(p => 
          p.type === "bar" && 
          p.brand !== bar.brand && 
          BRAND_PRIORITY.includes(p.brand)
        );
        if (altBar) barProducts = [bar, altBar];
      }
      
      if (barProducts.length === 1) {
        items.push({
          product: bar,
          amount: `${barCount} st`,
          carbs: barCount * bar.carbs,
          note: "Bra på lugnare partier när du orkar tugga. Mättar mer än gels.",
        });
      } else {
        // Två märken: dela ungefär jämnt
        const half = Math.ceil(barCount / 2);
        const rest = barCount - half;
        items.push({
          product: barProducts[0],
          amount: `${half} st`,
          carbs: half * barProducts[0].carbs,
          note: "Bra på lugnare partier när du orkar tugga. Mättar mer än gels.",
        });
        items.push({
          product: barProducts[1],
          amount: `${rest} st`,
          carbs: rest * (barProducts[1].carbs || 30),
          note: "Variation i smak och textur är guld på långa ultralopp då man lätt får matleda.",
        });
      }
    }
    
    duringPlan.push({
      heading: `Sikta på ${carbsHr} g kolhydrater per timme`,
      detail: `Totalt ca ${totalNeeded}g över loppets ${formatTime(time_h * 60)}. Drick ungefär ${plan.fluidHr} ml vätska/h med ca ${plan.sodiumHr} mg natrium.`,
      products: items,
    });
    
    // Gel-flaska om det blir många gels att hantera
    const totalGels = gelCount + gelCafCount;
    if (totalGels >= 4) {
      const flask = SOFT_FLASKS[0];
      duringPlan.push({
        heading: "Tips: häll gels i en mjukflaska",
        detail: `Med ${totalGels} gels att hantera under loppet blir det smidigare att tömma dem i en mjukflaska än att fippla med varsin förpackning. Du får då också möjlighet att ta små klunkar oftare istället för att tömma en hel gel åt gången – mer jämn energitillförsel och snällare mot magen. Späd gärna ut med lite vatten i flaskan om gelen är trögflytande.`,
        products: [{
          product: flask,
          amount: "1 st",
          carbs: 0,
          note: flask.note,
        }],
      });
    }
    
    // Vätskesystem — bara på riktiga ultralopp (50K+). På maraton och kortare
    // räcker en handflaska + vätskestationer, ingen springer ett vägmaraton
    // med löparväst på sig. Trail-50K och uppåt däremot är ett annat scenario:
    // glesare stationer, längre tid och man behöver ofta bära mer själv.
    if (distance >= 50) {
      duringPlan.push({
        heading: "Vätskesystem för långa lopp",
        detail: `På ultradistanser räcker sällan en handflaska, särskilt om det är varmt eller om vätskestationerna är glest placerade. En löparväst eller ett bärsystem ger plats för flera flaskor, alla dina gels samlat samt utrymme för regnplagg och annat smått. Eftersom passform och kapacitet är väldigt personligt rekommenderar vi att du tittar på vårt sortiment och kommer förbi butiken så hjälper vi dig hitta rätt.`,
        link: {
          href: "https://www.loplabbet.se/tillbehor/ryggsackar-vatskesystem",
          label: "Se vårt sortiment av löparryggsäckar och vätskesystem",
        },
        products: [],
      });
    }
    
    // Bansport-info — visas när det är ett lopp där bansport är vanligt (10K+).
    // Tipsar att räkna med stationerna i planen, men att gels är primär källa.
    if (time_h >= 0.6) {
      duringPlan.push({
        heading: "Vätskestationer på loppet",
        detail: `De flesta lopp erbjuder vatten och ofta sportdryck (vanligen Maurten, Enervit eller motsvarande beroende på arrangör) vid stationerna. Räkna med stationerna i din vätskeplan, men gör gels till din primära energikälla – då har du full kontroll på dosen och vet att smaken funkar för dig. Sportdrycken på stationerna är en bra bonus, särskilt sista milen. Tips: kolla loppets hemsida i förväg för att se vilket märke som serveras, då kan du testa det på något träningspass innan.`,
        products: [],
      });
    }
    
    // Elektrolyter om långt + varmt
    if (time_h > 1.5) {
      const elec = pick("electrolyte");
      if (elec) {
        duringPlan.push({
          heading: "Salttabletter vid värme/svett",
          detail: "Om det är varmt (>20°C) eller du svettas mycket, lägg till salttabletter i flaskan. Riktmärke: 1 tab per 250-500 ml utöver det som finns i sportdrycken.",
          products: [{ product: elec, amount: "1-3 st under loppet", note: elec.dose }],
        });
      }
    }
    
    // Ultra-specifika tips (4h+ lopp, men särskilt för riktiga ultralopp)
    if (time_h >= 4) {
      duringPlan.push({
        heading: "Strategi för långa lopp",
        detail: `På lopp över 4 timmar tappar magen successivt sin förmåga att ta upp koncentrerade kolhydrater och smaktrötthet är ofta det som faktiskt avgör – inte själva energin. Några konkreta råd: (1) Variera mellan söta och salta produkter, det är därför vi föreslagit bars från olika märken om du valt "spelar ingen roll". (2) Komplettera med riktig mat på checkpoints om loppet erbjuder det – riskaka, salta kex, banan, soppa. (3) Drick efter törst men aldrig under ${Math.round(plan.fluidHr * 0.6)} ml/h, hyponatremi är en reell risk när man dricker rent vatten under många timmar. (4) Ha en plan B – om en produkt slutar funka i magen, byt direkt istället för att tvinga in den.`,
        products: [],
      });
    }
  }
  
  // ── EFTER ──
  const afterPlan = [];
  afterPlan.push({
    timing: "0-30 minuter efter mål",
    heading: "Snabb återhämtning",
    detail: `Här är glykogensyntesen som högst. Få i dig ${recCarbs}g kolhydrater + ${plan.recProt}g protein så fort som möjligt. En återhämtningsdryck löser det enkelt och du slipper tugga när du är trött.`,
    product: pick("recovery"),
  });
  afterPlan.push({
    timing: "1-3 timmar efter",
    heading: "Riktig måltid",
    detail: `Ät en komplett måltid med kolhydrater + protein + grönsaker. Tex pasta med kött och tomatsås, sushi, eller en stor smörgås med skinka och ost. Drick 1,5x vätskeförlusten (väg dig före och efter om du vill ha exakt).`,
    product: null,
  });
  
  return { beforePlan, duringPlan, afterPlan };
}

  { id: 5, label: "5 km", desc: "Bana eller kort lopp", icon: "lightning" },
  { id: 10, label: "10 km", desc: "Klassisk distans", icon: "runner" },
  { id: 21.1, label: "Halvmaraton", desc: "21,1 km", icon: "target" },
  { id: 42.195, label: "Maraton", desc: "42,195 km", icon: "trophy" },
  { id: 50, label: "Ultra 50 km", desc: "Trail eller landsväg", icon: "mountain" },
  { id: 100, label: "Ultra 100 km", desc: "Långultra", icon: "mountains" },
  { id: -1, label: "Annan distans", desc: "Ange själv (km)", icon: "pencil" },
];

// Naturligt namn på distansen för dynamisk frågetext, t.ex.
// "Vad siktar du på för tid på maran?" istället för generiskt "...på loppet?".
function getDistanceName(ans) {
  const d = ans.distance;
  if (d === 5) return "5K";
  if (d === 10) return "10K";
  if (d === 21.1) return "halvmaran";
  if (d === 42.195) return "maran";
  if (d === 50 || d === 100) return "ultran";
  if (d === -1) {
    const km = parseFloat(ans.customDistance);
    return km > 0 ? `${km} km` : "loppet";
  }
  return "loppet";
}

   I standalone-läget (egen URL, egen flik) visas headern som vanligt. */
.ek.is-embed .ek-head{display:none;}

// ─── API-TRANSFORM ──────────────────────────────────────────────────────────
// Plockar ut energiprodukter ur live-API:et. Filtrerar PRIMÄRT på kategori
// ("energi"/"sportdryck"/"nutrition") så vi inte missar nya märken som dyker
// upp i sortimentet. Tar med produkter även om typen inte kan klassificeras
// (de hamnar då i "övrigt" och visas på during-sektionen som drink_mix-fallback).
//
// Hur många som matchar kan loggas i konsolen via DEBUG_API = true nedan.
// Sätt till true om du vill se en sammanfattning av API-träffen i konsolen
// (användbart om något ser konstigt ut i produktrekommendationerna).
const DEBUG_API = false;

function isEnergyDoc(doc) {
  // Vi gör tre oberoende checks: kategori, märke och produktnamn.
  // En träff räcker — bredare nät = färre missade produkter.

  // ─ 0) Tillbehör (flaskor, bälten etc) ska aldrig in i poolen, även om
  //      de råkar ligga i kategorin "Energi & Sportdryck" på sajten ─
  const docName = (doc.commercialname || doc.itemname || doc.name || "").toLowerCase();
  if (isAccessory(docName)) return false;

  // ─ 1) Kategori-fält (alla varianter vi sett i Intersports/Loplabbets API) ─
  // Lägg till fler om du ser fältnamn som missas i debug-utskriften.
  const catVals = [
    doc.categories, doc.category, doc.maincategory,
    doc.itemcategory, doc.itemcategorypaths, doc.itemcategoryname,
    doc.category_paths, doc.categorypath, doc.categorypaths,
    doc.categorynames, doc.categoryname,
    doc.facet_category, doc.facetcategory,
    doc.productcategory, doc.productcategories,
    doc.productcategorypath, doc.productcategorypaths,
    doc.productcategory_str_mv, doc.productcategoryname,
    doc.urlpath, doc.urlpaths, doc.itemurl, doc.url
  ];
  const catBlob = catVals
    .filter(v => v !== undefined && v !== null && v !== "")
    .map(v => Array.isArray(v) ? v.join(" ") : (typeof v === "object" ? JSON.stringify(v) : String(v)))
    .join(" ")
    .toLowerCase();

  const catKeywords = [
    "energi", "sportdryck", "sport-dryck", "sports-drink", "sportsdrink",
    "nutrition", "sportnutrition", "supplement", "kolhydrat",
    "energi-sportdryck", "energi & sportdryck"
  ];
  if (catKeywords.some(k => catBlob.includes(k))) return true;

  // ─ 2) Märke (substring-match, klarar "Enervit AB", "Maurten Group" etc.) ─
  const brandRaw = (doc.brand || doc.brand_name || doc.brandname ||
                    doc.manufacturer || doc.itembrand || "").toLowerCase().trim();
  if (brandRaw && ENERGY_BRANDS.some(b => {
    const bn = b.toLowerCase();
    return brandRaw === bn || brandRaw.includes(bn) || bn.includes(brandRaw);
  })) return true;

  // ─ 3) Produktnamn — om det matchar någon av våra typ-regexar ─
  // Säkrar oss om ett av våra märken (eller något helt annat) saknar både
  // brand- och kategoriindikator men namnet uppenbart är en energiprodukt.
  const name = (doc.commercialname || doc.itemname || doc.name || "").toLowerCase();
  if (name) {
    // Tydliga indikator-ord som betyder "det här är en energiprodukt"
    if (/\b(energigel|energy gel|drink mix|sportdryck|sportsdryck|salttab|salt.?tabletter|electrolyte|elektrolyt|återhämtning|recovery drink|carbo gel|bicarb|bikarbonat|kolhydrat)\b/i.test(name)) {
      return true;
    }
    // Klassificeringsregex i PRODUCT_TYPES
    if (classifyProduct(name)) return true;
  }

  return false;
}

function isInStock(doc) {
  // API:et kan uttrycka lagerstatus på flera sätt - hantera alla
  const candidates = [doc.salable, doc.saleable, doc.instock, doc.in_stock, doc.available];
  // Om INGET fält finns - anta att den är säljbar (hellre falskt positiv än
  // falskt negativ; tappar man en produkt missar man hela rekommendationen)
  if (candidates.every(v => v === undefined || v === null)) return true;
  return candidates.some(v =>
    v === true || v === 1 || v === "1" || v === "true" || v === "yes"
  );
}

function transformAPIResponse(data) {
  const docs = data?.data?.products?.documents || data?.documents ||
               data?.hits?.hits?.map(h => h._source) || data?.products || [];

  const seen = new Set();
  const result = [];
  let dropped = { notEnergy: 0, dup: 0, noName: 0, noStock: 0, noClass: 0 };

  for (const doc of docs) {
    if (!isEnergyDoc(doc)) { dropped.notEnergy++; continue; }

    const pNum = doc.productnumber || doc.id || doc.itemnumber;
    if (!pNum) { dropped.noName++; continue; }
    if (seen.has(pNum)) { dropped.dup++; continue; }

    if (!isInStock(doc)) { dropped.noStock++; continue; }

    const brand = (doc.brand || doc.brand_name || doc.brandname || "").trim();
    const name = (doc.commercialname || doc.itemname || doc.name || "").trim();
    if (!name) { dropped.noName++; continue; }

    const fullName = brand ? `${brand} ${name}`.trim() : name;
    // Strikt klassificering: om vi inte kan identifiera produkttypen från
    // namnet så är det förmodligen inte en energiprodukt (även om kategorin
    // matchade). Detta hindrar t.ex. löparskor som råkar ha "energi" i URL:en
    // från att klassificeras som drink_mix.
    const type = classifyProduct(name) || classifyProduct(fullName);
    if (!type) { dropped.noClass++; continue; }
    
    // Visningsnamn: rensa varianter som bara skiljer i storleksbeteckning.
    // Maurten Bicarb System säljs som 12/15/19/22/25 men det är samma produkt
    // för kalkylatorns syfte — visa generiskt namn så det inte ser slumpmässigt ut.
    let displayName = fullName;
    if (type === "bicarb" && /maurten/i.test(brand)) {
      displayName = "Maurten Bicarb System";
    }

    const img = doc.itemimages?.[0] ? `${CDN}/${doc.itemimages[0]}` : null;
    const url = doc.itemurl
      ? `${LL}/products/${doc.itemurl}`
      : `${LL}/varumarken/${doc.brand_urlslug || ''}`;
    const price = parseFloat(doc.price?.price || doc.price?.regularprice || doc.price || 0);

    seen.add(pNum);
    result.push({
      id: pNum,
      brand: brand || "Övrigt",
      name: displayName,
      type,
      carbs: PRODUCT_TYPES[type]?.typical_carbs ?? null,
      caf: PRODUCT_TYPES[type]?.typical_caf ?? null,
      dose: doc.shortdescription || "",
      price: price || null,
      url,
      img,
      inStock: true,
    });
  }

  if (DEBUG_API) {
    console.log(`[Energikalkylator] API-träff: ${result.length} produkter`, {
      total_docs: docs.length, dropped, sample_brands: [...new Set(result.map(r => r.brand))]
    });
    // Om vi får få träffar — skriv ut första doc:ets fält så vi kan se vad
    // API:et faktiskt heter de saker vi letar efter.
    if (result.length < 20 && docs.length > 0) {
      console.warn("[Energikalkylator] Få träffar — så här ser första API-dokumentet ut. Kolla efter kategori-/märkes-fält som koden inte använder ännu:", docs[0]);
      console.warn("[Energikalkylator] Tillgängliga toppnivå-fält:", Object.keys(docs[0]).join(", "));
    }
  }

  return result;
}

      <circle cx="8" cy="8" r="5"/>
      <circle cx="14" cy="8" r="5"/>
      <circle cx="11" cy="14" r="5"/>
    </g>),
    // Boosters
    beetroot: (<g>
      <path d="M11 20c-5-1-7-5-6-9 1-2 4-3 6-2 2-1 5 0 6 2 1 4-1 8-6 9z"/>
      <path d="M11 9V4M9 5c1-1 3-1 4 1M11 4c-1-2 1-3 2-2"/>
    </g>),
    broccoli: (<g>
      <circle cx="11" cy="6" r="3"/>
      <circle cx="6" cy="9" r="2.5"/>
      <circle cx="16" cy="9" r="2.5"/>
      <path d="M7 11l1 4M15 11l-1 4M11 9v9M8 18h6"/>
    </g>),
    erlenmeyer: (<g>
      <path d="M8 2h6M9 2v5L4 17c-.5 1.5.5 3 2 3h10c1.5 0 2.5-1.5 2-3L13 7V2"/>
      <path d="M6 13c2-1 4 1 6 0s4 1 5 0"/>
    </g>),
    // Övrigt
    warning: (<g>
      <path d="M11 3l9 16H2L11 3z"/>
      <path d="M11 9v4"/>
      <circle cx="11" cy="16" r=".8" fill="currentColor"/>
    </g>),
    bottle: (<g>
      <path d="M9 2h4v3l1 2v11c0 1-.5 2-2 2H9c-1.5 0-2-1-2-2V7l1-2V2z"/>
      <path d="M7 11h7"/>
    </g>),
    check: <path d="M4 11l4 4 10-10"/>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 22 22" 
         fill="none" stroke="currentColor" strokeWidth="1.75"
         strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
      {paths[name] || null}
    </svg>
  );
}

function ProductCard({ product, amount, note }) {
  if (!product) return null;
  return (

      {product.img ? (
        <img className="ek-prod-img" src={product.img} alt={product.name} 
             loading="lazy" decoding="async"
             onError={(e) => { e.target.style.display = "none"; e.target.nextSibling.style.display = "flex"; }} />

// ─── HUVUDKOMPONENTEN ───────────────────────────────────────────────────────
// När användaren väljer kön fyller vi i rimliga default-värden för vikt,
// längd och ålder så att stepper-pilarna har något att räkna upp/ned från.
// Värdena är ungefärliga svenska medelvärden för aktiva motionärer.
// Användaren kan alltid skriva över dem manuellt.
const SEX_DEFAULTS = {
  man:    { weight: 70, height: 178, age: 35 },
  kvinna: { weight: 60, height: 167, age: 35 },
};

function EnergiKalkylator() {
  // Detektera om vi körs i iframe (typiskt embed på loplabbet.se via EpiServer).
  // I så fall göms headern och inre padding minskas för att smälta in i sidan
  // som redan har sin egen Löplabbet-header.
  // Kan också tvingas på via URL-parameter ?embed=1 för testning.
  const isEmbed = useMemo(() => {
    try {
      if (window.parent !== window) return true;
      if (new URLSearchParams(window.location.search).get("embed") === "1") return true;
    } catch (e) { /* sandboxed iframe → behandla som embed */ return true; }
    return false;
  }, []);
  
  const [phase, setPhase] = useState("intro");      // intro | quiz | calc | result
  const [step, setStep] = useState(0);
  const [ans, setAns] = useState({
    distance: null,
    customDistance: "",
    sex: null,
    weight: "", height: "", age: "",
    timeH: "", timeM: "", timeS: "",
    experience: null,
    brand: null,
    boosters: [],
  });
  // Initial state: kuraterad fallback-lista. Ersätts av produkter.json
  // i useEffect så fort den hunnit laddas (oftast några ms eftersom det är
  // en statisk fil i samma origin).
  const [products, setProducts] = useState(() => FALLBACK_PRODUCTS.map(applyUrlOverride));
  const [dataState, setDataState] = useState("loading"); // loading | live | fallback
  
  // Hämta produkter från statisk JSON i bakgrunden.
  useEffect(() => {
    let cancelled = false;
    fetch(PRODUCTS_JSON_URL, { cache: "default" })
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        if (cancelled) return;
        const live = Array.isArray(data) ? data : (data.products || []);
        if (live.length >= 3) {
          // Mergea: använd live-data för det den har, behåll fallback för
          // produkttyper som inte finns i live (t.ex. Nomio-shoten om den
          // tillfälligt skulle saknas i feeden).
          const merged = [...live, ...FALLBACK_PRODUCTS.filter(f => 
            !live.some(l => l.brand === f.brand && l.type === f.type)
          )];
          setProducts(merged.map(applyUrlOverride));
          setDataState("live");
          if (DEBUG_API) {
            console.log(`[Energikalkylator] Laddade ${live.length} produkter från ${PRODUCTS_JSON_URL}` +
                        (data.updated ? ` (uppdaterad ${data.updated})` : ""));
          }
        } else {
          setDataState("fallback");
          console.warn(`[Energikalkylator] produkter.json gav för få träffar (${live.length}), använder fallback.`);
        }
      })
      .catch(e => {
        if (cancelled) return;
        console.warn("[Energikalkylator] Kunde inte ladda produkter.json, använder fallback:", e.message);
        setDataState("fallback");
      });
    return () => { cancelled = true; };
  }, []);
  
  const cur = STEPS[step];
  const prog = phase === "result" ? 100 : phase === "intro" ? 0 : ((step + 1) / STEPS.length) * 100;
  
  const setVal = (key, val) => setAns(p => ({ ...p, [key]: val }));
  const toggleBooster = (b) => setAns(p => ({
    ...p, boosters: p.boosters.includes(b) ? p.boosters.filter(x => x !== b) : [...p.boosters, b]
  }));
  
  // Validera nuvarande steg
  const canNext = useMemo(() => {
    if (!cur) return false;
    switch (cur.id) {
      case "distance": return ans.distance !== null && (ans.distance > 0 || (parseFloat(ans.customDistance) > 0));
      case "sex": return ans.sex !== null;
      case "metrics": return parseInt(ans.weight) >= 30 && parseInt(ans.height) >= 100 && parseInt(ans.age) >= 10;
      case "time": {
        const total = (parseInt(ans.timeH) || 0) * 60 + (parseInt(ans.timeM) || 0) + (parseInt(ans.timeS) || 0) / 60;
        return total >= 10;
      }
      case "experience": return ans.experience !== null;
      case "brand": return ans.brand !== null;
      case "boosters": return true; // alltid valbar
      default: return false;
    }
  }, [cur, ans]);
  
  // Scrolla till toppen efter varje steg-byte. På mobil ligger användaren
  // ofta halvvägs ner i quizen när de trycker "Nästa", och utan denna fix
  // får de manuellt scrolla upp för att se nästa fråga. Vi gör två saker:
  //  1. Scrolla kalkylatorns egen sida till toppen (för fall utan iframe)
  //  2. Posta till parent-sidan att scrolla iframen i view (i EpiServer-embed)
  const scrollToTop = () => {
    try {
      window.scrollTo({ top: 0, behavior: "smooth" });
      if (window.parent !== window) {
        // Posta direkt + igen efter att React renderat och iframen rapporterat
        // ny höjd. Annars kan parent scrolla till iframens GAMLA position
        // (t.ex. när man trycker Räkna om från resultatet → intro: iframen
        // krymps men scrollen hade redan beräknats mot resulthöjden).
        window.parent.postMessage({ type: "energikalkylator:scrollTop" }, "*");
        setTimeout(() => {
          window.parent.postMessage({ type: "energikalkylator:scrollTop" }, "*");
        }, 200);
      }
    } catch (e) { /* tyst fallback */ }
  };
  
  const goNext = () => {
    if (step < STEPS.length - 1) {
      setStep(s => s + 1);
      scrollToTop();
    } else {
      setPhase("calc");
      scrollToTop();
      setTimeout(() => setPhase("result"), 1100);
    }
  };
  const goBack = () => {
    if (step > 0) setStep(s => s - 1);
    else setPhase("intro");
    scrollToTop();
  };
  const restart = () => { 
    setPhase("intro"); setStep(0); 
    setAns({
      distance: null, customDistance: "",
      sex: null, weight: "", height: "", age: "",
      timeH: "", timeM: "", timeS: "",
      experience: null, brand: null, boosters: [],
    }); 
    scrollToTop();
  };
  
  // Bygg input för calc om vi är på resultatsidan
  const plan = useMemo(() => {
    if (phase !== "result") return null;
    const distance = ans.distance > 0 ? ans.distance : parseFloat(ans.customDistance);
    const timeMin = (parseInt(ans.timeH) || 0) * 60 + (parseInt(ans.timeM) || 0) + (parseInt(ans.timeS) || 0) / 60;
    return calculatePlan({
      sex: ans.sex,
      age: parseInt(ans.age),
      weight: parseInt(ans.weight),
      height: parseInt(ans.height),
      distance, timeMin,
      experience: ans.experience,
      brand: ans.brand,
      boosters: ans.boosters,
    });
  }, [phase, ans]);
  
  const recs = useMemo(() => plan ? suggestProducts(plan, products) : null, [plan, products]);
  
  // Pace-formattering live medan användaren skriver tid
  const livePace = useMemo(() => {
    const distance = ans.distance > 0 ? ans.distance : parseFloat(ans.customDistance);
    const totalMin = (parseInt(ans.timeH) || 0) * 60 + (parseInt(ans.timeM) || 0) + (parseInt(ans.timeS) || 0) / 60;
    if (!distance || distance <= 0 || totalMin < 5) return null;
    const pace = totalMin / distance;
    const m = Math.floor(pace);
    const s = Math.round((pace - m) * 60);
    return `${m}:${s.toString().padStart(2, "0")}/km`;
  }, [ans.distance, ans.customDistance, ans.timeH, ans.timeM, ans.timeS]);
  
  // ── RENDER ──
  return (
    <>
      <style>{css}</style>
      <div className={`ek${isEmbed ? " is-embed" : ""}`}>
        <div className="ek-wrap">
          
          {/* HEADER */}
          <div className="ek-head">
            <div className="ek-head-l">
              <span className="ek-logo-wrap">
                <img className="ek-logo" 
                     src="https://www.loplabbet.se/globalassets/loplabbet/loggos/loplabbet-logo_new.png" 
                     alt="Löplabbet"
                     onError={(e)=>{e.target.style.display='none';}} />
              </span>
              <span className="ek-tag">Energikalkylator</span>
            </div>
            {phase === "quiz" && <span className="ek-step-counter">Steg {step + 1} / {STEPS.length}</span>}
          </div>
          
          {/* PROGRESS */}
          {phase !== "intro" && (
            <div className="ek-prog"><div className="ek-prog-fill" style={{ width: `${prog}%` }}/></div>
          )}
          
          {/* INTRO */}
          {phase === "intro" && (
            <div className="ek-intro">
              <div className="eye">Personlig nutrition</div>
              <h1 className="ek-h1">Hitta din<br/><em>perfekta</em><br/>energiplan</h1>
              <p className="ek-intro-body">
                Få en konkret plan för <strong>innan, under och efter</strong> ditt lopp, 
                anpassad efter din kropp, din erfarenhet och vilka produkter du gillar 
                från <strong>Umara, Maurten och Enervit</strong>.
              </p>
              <div className="ek-bullets">
                <div className="ek-bullet"><div className="ek-bullet-dot"/>Räknar exakt energi­förbrukning baserat på din kropp och loppets längd</div>
                <div className="ek-bullet"><div className="ek-bullet-dot"/>Ger en konkret produktrekommendation från Löplabbets sortiment</div>
                <div className="ek-bullet"><div className="ek-bullet-dot"/>Tipsar om boosters som rödbetsshot och bikarbonat när det passar</div>
              </div>
              <button className="ek-cta" 
                      disabled={dataState === "loading"} 
                      onClick={() => { setPhase("quiz"); setStep(0); }}>
                {dataState === "loading" ? "Laddar sortimentet…" : "Starta kalkylatorn"} 
                {dataState !== "loading" && <span className="arr">→</span>}
              </button>
              <div className="ek-loadnote">
                {dataState === "loading" && (<>
                  <div className="ek-mini-spinner"/> Hämtar dagens energiprodukter…
                </>)}
                {dataState === "live" && (<>
                  <span className="ek-mini-check">✓</span> Sortimentet uppdaterat
                </>)}
              </div>
            </div>
          )}
          
          {/* QUIZ-STEG */}
          {phase === "quiz" && (
            <div className="ek-step">
              <span className="ek-q-ico"><Icon name={cur.icon}/></span>
              <h2 className="ek-q-h">
                {cur.id === "time"
                  ? `Vad siktar du på för tid på ${getDistanceName(ans)}?`
                  : cur.q}
              </h2>
              <p className="ek-q-sub">{cur.sub}</p>
              
              {/* DISTANS */}
              {cur.id === "distance" && (
                <>
                  <div className="ek-opts">
                    {DISTANCES.map(d => (
                      <button key={d.id} 
                              className={`ek-opt ${ans.distance === d.id ? "sel" : ""}`}
                              onClick={() => setVal("distance", d.id)}>
                        <span className="ek-opt-ico"><Icon name={d.icon}/></span>
                        <div className="ek-opt-txt">
                          <div className="ek-opt-lbl">{d.label}</div>
                          <div className="ek-opt-dsc">{d.desc}</div>
                        </div>
                        <div className="ek-chk"><div className="ek-dot"/></div>
                      </button>
                    ))}
                  </div>
                  {ans.distance === -1 && (
                    <div className="ek-input-wrap" style={{marginTop: 14}}>
                      <input className="ek-input" type="number" min="2" max="500" step="0.1"
                             placeholder="Ange distans"
                             value={ans.customDistance}
                             onChange={e => setVal("customDistance", e.target.value)} />
                      <span className="ek-input-suffix">km</span>
                    </div>
                  )}
                </>
              )}
              
              {/* KÖN */}
              {cur.id === "sex" && (
                <div className="ek-opts">
                  {[
                    { id: "kvinna", label: "Kvinna", desc: "Kvinnokroppen oxiderar mer fett vid samma intensitet" },
                    { id: "man", label: "Man", desc: "Använder förhållandevis mer kolhydrater vid given intensitet" },
                  ].map(o => (
                    <button key={o.id} 
                            className={`ek-opt ${ans.sex === o.id ? "sel" : ""}`}
                            onClick={() => setAns(p => {
                              const def = SEX_DEFAULTS[o.id] || SEX_DEFAULTS.man;
                              // En siffra räknas som "default" (= inte användarens egen)
                              // om den matchar någon av de kön-anpassade defaults i tabellen.
                              // Då ska den uppdateras vid kön-byte. Om värdet är tomt eller
                              // matchar inget default ska det också ersättas/sättas.
                              // Om användaren skrivit en egen siffra (t.ex. 75 kg) bevaras den.
                              const isDef = (key, val) => {
                                if (val === "" || val == null) return true;
                                const n = parseFloat(val);
                                return Object.values(SEX_DEFAULTS).some(d => d[key] === n);
                              };
                              return {
                                ...p,
                                sex: o.id,
                                weight: isDef("weight", p.weight) ? def.weight : p.weight,
                                height: isDef("height", p.height) ? def.height : p.height,
                                age:    isDef("age",    p.age)    ? def.age    : p.age,
                              };
                            })}>
                      <span className="ek-opt-ico"><Icon name={o.id === "kvinna" ? "venus" : "mars"}/></span>
                      <div className="ek-opt-txt">
                        <div className="ek-opt-lbl">{o.label}</div>
                        <div className="ek-opt-dsc">{o.desc}</div>
                      </div>
                      <div className="ek-chk"><div className="ek-dot"/></div>
                    </button>
                  ))}
                </div>
              )}
              
              {/* METRICS */}
              {cur.id === "metrics" && (() => {
                // Defaultvärden anpassade efter valt kön. Används både som
                // placeholder (synlig hint i tomt fält) och som start-värde
                // när användaren börjar trycka pil-upp/ner i ett tomt fält.
                const defaults = ans.sex === "kvinna"
                  ? { weight: 60, height: 167, age: 35 }
                  : { weight: 75, height: 180, age: 35 };
                
                // Pil-upp/ner i ett tomt fält ska räkna från default, inte 0.
                // Vi lyssnar på keydown och stoppar webbläsarens egna stepp
                // om värdet är tomt — sätter istället defaultvärdet.
                const stepFromDefault = (key, val, def, setter) => (e) => {
                  if (e.key === "ArrowUp" || e.key === "ArrowDown") {
                    if (!val || val === "") {
                      e.preventDefault();
                      setter(String(def));
                    }
                  }
                };
                
                return (
                <div className="ek-grid-3">
                  <div className="ek-field">
                    <label className="ek-field-lbl">Vikt</label>
                    <div className="ek-input-wrap">
                      <input className="ek-input" type="number" min="30" max="200" 
                             placeholder={String(defaults.weight)}
                             value={ans.weight} 
                             onChange={e => setVal("weight", e.target.value)}
                             onKeyDown={stepFromDefault("weight", ans.weight, defaults.weight, v => setVal("weight", v))} />
                      <span className="ek-input-suffix">kg</span>
                    </div>
                  </div>
                  <div className="ek-field">
                    <label className="ek-field-lbl">Längd</label>
                    <div className="ek-input-wrap">
                      <input className="ek-input" type="number" min="100" max="220" 
                             placeholder={String(defaults.height)}
                             value={ans.height} 
                             onChange={e => setVal("height", e.target.value)}
                             onKeyDown={stepFromDefault("height", ans.height, defaults.height, v => setVal("height", v))} />
                      <span className="ek-input-suffix">cm</span>
                    </div>
                  </div>
                  <div className="ek-field">
                    <label className="ek-field-lbl">Ålder</label>
                    <div className="ek-input-wrap">
                      <input className="ek-input" type="number" min="10" max="100" 
                             placeholder={String(defaults.age)}
                             value={ans.age} 
                             onChange={e => setVal("age", e.target.value)}
                             onKeyDown={stepFromDefault("age", ans.age, defaults.age, v => setVal("age", v))} />
                      <span className="ek-input-suffix">år</span>
                    </div>
                  </div>
                </div>
                );
              })()}
              
              {/* TID */}
              {cur.id === "time" && (
                <>
                  <div className="ek-time">
                    <input className="ek-time-input" type="number" min="0" max="48" placeholder="0"
                           value={ans.timeH} onChange={e => setVal("timeH", e.target.value)} />
                    <span className="ek-time-sep">:</span>
                    <input className="ek-time-input" type="number" min="0" max="59" placeholder="00"
                           value={ans.timeM} onChange={e => setVal("timeM", e.target.value)} />
                    <span className="ek-time-sep">:</span>
                    <input className="ek-time-input" type="number" min="0" max="59" placeholder="00"
                           value={ans.timeS} onChange={e => setVal("timeS", e.target.value)} />
                  </div>
                  <div className="ek-time-meta">
                    <span>Timmar : Minuter : Sekunder</span>
                    {livePace && <span><strong>Snittfart {livePace}</strong></span>}
                  </div>
                </>
              )}
              
              {/* EXPERIENCE */}
              {cur.id === "experience" && (
                <div className="ek-opts">
                  {[
                    { id: "nyborjare", label: "Nybörjare", desc: "Sällan eller aldrig ätit gels under löpning" },
                    { id: "medel", label: "Lite vana", desc: "Använder gels och dryck men inte regelbundet på alla pass" },
                    { id: "avancerad", label: "Mycket vana", desc: "Tränar systematiskt med kolhydratintag, har stark mage" },
                  ].map(o => (
                    <button key={o.id} 
                            className={`ek-opt ${ans.experience === o.id ? "sel" : ""}`}
                            onClick={() => setVal("experience", o.id)}>
                      <span className="ek-opt-ico"><Icon name={o.id === "nyborjare" ? "sprout" : o.id === "medel" ? "leaf" : "tree"}/></span>
                      <div className="ek-opt-txt">
                        <div className="ek-opt-lbl">{o.label}</div>
                        <div className="ek-opt-dsc">{o.desc}</div>
                      </div>
                      <div className="ek-chk"><div className="ek-dot"/></div>
                    </button>
                  ))}
                </div>
              )}
              
              {/* BRAND */}
              {cur.id === "brand" && (
                <div className="ek-opts">
                  {[
                    { id: "alla", label: "Visa alla", icon: "globe",
                      desc: "Vi väljer bästa produkten för varje moment, oavsett märke. Bra om du inte är låst vid ett favoritmärke." },
                    { id: "umara", label: "Umara", icon: "drop",
                      desc: "Svenskt familjeföretag med fokus på smak, magtålighet och rena ingredienser. Du själv doserar koncentrationen i sportdrycken." },
                    { id: "maurten", label: "Maurten", icon: "hexagon",
                      desc: "Göteborgsföretag med patenterad hydrogelteknik som gör att magen klarar 100+ g kolhydrater per timme. Eliud Kipchoges val." },
                    { id: "enervit", label: "Enervit", icon: "gel",
                      desc: "Italiensk sportnutritionspionjär sedan 80-talet. Brett sortiment där varje produkt har en specifik roll – från pre-race till återhämtning." },
                  ].map(o => {
                    const brandKey = o.id === "maurten" ? "Maurten" 
                                   : o.id === "enervit" ? "Enervit" 
                                   : o.id === "umara" ? "Umara" : null;
                    return (
                    <button key={o.id} 
                            data-brand={brandKey || undefined}
                            className={`ek-opt ${ans.brand === o.id ? "sel" : ""}`}
                            onClick={() => setVal("brand", o.id)}>
                      <span className="ek-opt-ico"><Icon name={o.icon}/></span>
                      <div className="ek-opt-txt">
                        <div className="ek-opt-lbl">{o.label}</div>
                        <div className="ek-opt-dsc">{o.desc}</div>
                      </div>
                      <div className="ek-chk"><div className="ek-dot"/></div>
                    </button>
                  );})}
                </div>
              )}
              
              {/* BOOSTERS */}
              {cur.id === "boosters" && (() => {
                // Beräkna distans i km — om "Annan distans" ej fyllts i ännu visas
                // alla boosters (vi vet inte om det är 5K eller 100K än).
                const km = ans.distance === -1 
                  ? (parseFloat(ans.customDistance) || 0)
                  : (ans.distance || 0);
                
                // Bedöm relevans:
                // - Beetroot: bäst för 5K-maraton (kortare högintensiva lopp)
                //   Marginell vinst på ultra eftersom intensiteten är lägre.
                // - Bicarb: 30-60 min effekt → kort till medellång intensiv 
                //   prestation. Inte vettigt på ultra (magrisk + effekten räcker
                //   inte). Kräver också vana ("nyborjare" ska INTE ta bikarb).
                // - Nomio: tas 2-3h före, mild effekt, generellt OK för alla lopp.
                const beetrootSkip = km > 0 && km > 50;  // ultra > 50K
                const bicarbSkip = (km > 0 && km > 50) || ans.experience === "nyborjare";
                const bicarbSkipReason = ans.experience === "nyborjare"
                  ? "Kräver vana, skip om magen inte är intränad"
                  : "Effekten varar 30-60 min — för kort för ultralopp";
                
                return (
                <>
                <div className="ek-opts">
                  <button className={`ek-opt multi ${ans.boosters.includes("beetroot") ? "sel" : ""} ${beetrootSkip ? "ek-opt-dim" : ""}`}
                          onClick={() => !beetrootSkip && toggleBooster("beetroot")}>
                    <span className="ek-opt-ico"><Icon name="beetroot"/></span>
                    <div className="ek-opt-txt">
                      <div className="ek-opt-lbl">Rödbetsshot</div>
                      <div className="ek-opt-dsc">Nitrat förbättrar löpekonomin med 1-3%. Bra för 5K upp till maraton. Vi väljer märke baserat på lager.</div>
                      {beetrootSkip && <div className="ek-opt-warn"><Icon name="warning" size={13}/> Marginell effekt på ultra — intensiteten är för låg</div>}
                    </div>
                    <div className="ek-chk"><div className="ek-dot"/></div>
                  </button>
                  <button className={`ek-opt multi ${ans.boosters.includes("nomio") ? "sel" : ""}`}
                          onClick={() => toggleBooster("nomio")}>
                    <span className="ek-opt-ico"><Icon name="broccoli"/></span>
                    <div className="ek-opt-txt">
                      <div className="ek-opt-lbl">Nomio prestationsshot</div>
                      <div className="ek-opt-dsc">Svensk shot från broccoligroddar (ITC). Minskar mjölksyra och oxidativ stress. Tas 2-3h före start.</div>
                    </div>
                    <div className="ek-chk"><div className="ek-dot"/></div>
                  </button>
                  <button className={`ek-opt multi ${ans.boosters.includes("bicarb") ? "sel" : ""} ${bicarbSkip ? "ek-opt-dim" : ""}`}
                          onClick={() => !bicarbSkip && toggleBooster("bicarb")}>
                    <span className="ek-opt-ico"><Icon name="erlenmeyer"/></span>
                    <div className="ek-opt-txt">
                      <div className="ek-opt-lbl">Bikarbonat</div>
                      <div className="ek-opt-dsc">Buffrar laktat. Bäst för korta-medellånga lopp och elitsatsningar.</div>
                      {bicarbSkip && <div className="ek-opt-warn"><Icon name="warning" size={13}/> {bicarbSkipReason}</div>}
                    </div>
                    <div className="ek-chk"><div className="ek-dot"/></div>
                  </button>
                </div>
                <p style={{fontSize:12,color:"var(--dim)",marginTop:14,lineHeight:1.5}}>
                  Vill du köra utan boosters? Hoppa direkt till <strong style={{color:"var(--mut)"}}>Räkna ut planen</strong> nedan.
                </p>
                </>
                );
              })()}
              
              <div className="ek-nav">
                <button className="btn btn-back" onClick={goBack}>← Tillbaka</button>
                <button className="btn btn-next" disabled={!canNext} onClick={goNext}>
                  {step === STEPS.length - 1 ? "Räkna ut planen" : "Nästa →"}
                </button>
              </div>
            </div>
          )}
          
          {/* CALC LOADING */}
          {phase === "calc" && (
            <div className="ek-calc">
              <div className="ek-calc-spinner"/>
              <div className="ek-calc-txt">
                <strong>Bygger din energiplan</strong>
                Räknar förbrukning, kolhydrater och produktförslag…
              </div>
            </div>
          )}
          
          {/* RESULTAT */}
          {phase === "result" && plan && recs && (
            <div className="ek-result">
              <div className="ek-result-eye">Din personliga plan</div>
              <h1 className="ek-result-h">
                {plan.distance} km på<br/>
                <em>{(() => {
                  const totalMin = Math.round(plan.timeMin);
                  const h = Math.floor(totalMin / 60);
                  const m = totalMin - h * 60;
                  if (h === 0) return `${m} min`;
                  if (m === 0) return `${h}h`;
                  return `${h}h ${m}min`;
                })()}</em>
              </h1>
              <p className="ek-result-sub">
                För dig (<strong>{plan.weight} kg, {plan.sex}</strong>) i fart <strong>{Math.floor(plan.pace_min_per_km)}:{Math.round((plan.pace_min_per_km % 1) * 60).toString().padStart(2,"0")}/km</strong>. 
                Det här är vad din kropp behöver, och hur du fyller på det smart med produkter från Löplabbet.
              </p>
              
              {/* STATS */}
              <div className="ek-stats">
                <div className="ek-stat accent">
                  <div className="ek-stat-lbl">Energi totalt</div>
                  <div className="ek-stat-val">{plan.totalKcal}<span className="unit">kcal</span></div>
                </div>
                <div className="ek-stat">
                  <div className="ek-stat-lbl">Kolhydrater</div>
                  <div className="ek-stat-val">{plan.carbGrams}<span className="unit">g</span></div>
                </div>
                <div className="ek-stat">
                  <div className="ek-stat-lbl">Mål per timme</div>
                  <div className="ek-stat-val">{plan.carbsHr}<span className="unit">g/h</span></div>
                </div>
                <div className="ek-stat">
                  <div className="ek-stat-lbl">Vätska / timme</div>
                  <div className="ek-stat-val">{plan.fluidHr}<span className="unit">ml</span></div>
                </div>
              </div>
              
              {/* Pedagogisk inforuta — varför intaget kan vara lägre än totalförbrukning */}
              <div className="ek-insight">
                <Icon name="lightning" size={20}/>
                <div className="ek-insight-body">
                  Du har redan ca <strong>{plan.glycogenStores} g glykogen</strong> lagrat i muskler och lever, det räcker långt på egen hand.
                  Intaget på <strong>{plan.carbsHr} g/h</strong> är vad du behöver fylla på <em>utöver</em> dina egna depåer för att hålla farten hela vägen.
                </div>
              </div>
              
              {/* INNAN */}
              <section className="ek-section">
                <div className="ek-section-head">
                  <span className="ek-section-num before">01</span>
                  <h2 className="ek-section-title">Innan loppet</h2>
                </div>
                <p className="ek-section-sub">Förberedelser dagarna och timmarna före start.</p>
                {recs.beforePlan.map((b, i) => (
                  <div className="ek-block" key={i}>
                    <div className="ek-block-timing">{b.timing}</div>
                    <h3 className="ek-block-h">{b.heading}</h3>
                    <p className="ek-block-detail">{b.detail}</p>
                    {b.product && (
                      <div className="ek-prod-list">
                        <ProductCard product={b.product} amount={b.productAmount} note={b.product.dose}/>
                      </div>
                    )}
                  </div>
                ))}
              </section>
              
              {/* UNDER */}
              <section className="ek-section">
                <div className="ek-section-head">
                  <span className="ek-section-num during">02</span>
                  <h2 className="ek-section-title">Under loppet</h2>
                </div>
                <p className="ek-section-sub">Konkret upplägg av dryck, gel och bars.</p>
                {recs.duringPlan.map((d, i) => (
                  <div className="ek-block ek-block-during" key={i}>
                    <div className="ek-block-timing">Strategi</div>
                    <h3 className="ek-block-h">{d.heading}</h3>
                    <p className="ek-block-detail">{d.detail}</p>
                    {d.link && (
                      <a className="ek-block-link" href={d.link.href} target="_blank" rel="noopener noreferrer">
                        {d.link.label} →
                      </a>
                    )}
                    {d.products && d.products.length > 0 && (
                      <div className="ek-prod-list">
                        {d.products.map((p, j) => (
                          <ProductCard key={j} product={p.product} amount={p.amount} note={p.note}/>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </section>
              
              {/* EFTER */}
              <section className="ek-section">
                <div className="ek-section-head">
                  <span className="ek-section-num after">03</span>
                  <h2 className="ek-section-title">Efter loppet</h2>
                </div>
                <p className="ek-section-sub">Återhämtning för att maximera anpassning till nästa pass.</p>
                {recs.afterPlan.map((a, i) => (
                  <div className="ek-block ek-block-after" key={i}>
                    <div className="ek-block-timing">{a.timing}</div>
                    <h3 className="ek-block-h">{a.heading}</h3>
                    <p className="ek-block-detail">{a.detail}</p>
                    {a.product && (
                      <div className="ek-prod-list">
                        <ProductCard product={a.product} note={`${plan.recCarbs}g kolhydrater + ${plan.recProt}g protein`}/>
                      </div>
                    )}
                  </div>
                ))}
              </section>
              
              {/* DISCLAIMER */}
              <div className="ek-disc">
                <strong>Tänk på:</strong> Det här är teoretiska beräkningar baserade på etablerad sportnutritions­forskning 
                (Cunninghams formel, ACSM-data, Jeukendrup). Individuella skillnader är stora, testa upplägget på 
                träningspass innan tävlingsdagen. Frågor? Prata med personalen i butik!
              </div>
              
              {/* ACTIONS */}
              <div className="ek-actions">
                <button className="btn-restart" onClick={restart}>↺ Räkna om</button>
                <a className="btn-share" href="https://www.loplabbet.se/lopning/tillbehor/energi-sportdryck?in_stock=true" target="_blank" rel="noopener">Se hela sortimentet</a>
              </div>
              
              <div className="ek-source">
                {dataState === "live" 
                  ? `Sortiment via loplabbet.se • ${products.length} produkter` 
                  : ""}
              </div>
            </div>
          )}
          
        </div>
      </div>
    </>
  );
}

// ─── HÖJDRAPPORTERING TILL PARENT-FÖNSTRET ──────────────────────────────────
// När den här sidan bäddas in som iframe (t.ex. i ett HTML-block i EpiServer)
// vill vi att iframen ska följa innehållets höjd. Annars får man antingen
// onödigt vit yta eller scrollbar-i-scrollbar.
// Skickar nuvarande höjd via postMessage varje gång innehållet ändrar storlek.
if (window.parent !== window) {
  let lastHeight = 0;
  const reportHeight = () => {
    const h = document.documentElement.scrollHeight;
    if (Math.abs(h - lastHeight) > 2) {
      lastHeight = h;
      window.parent.postMessage({ type: "energikalkylator:resize", height: h }, "*");
    }
  };
  // ResizeObserver fångar upp när React renderar om — t.ex. när användaren
  // klickar sig genom quizen eller resultatet expanderar.
  if (typeof ResizeObserver !== "undefined") {
    new ResizeObserver(reportHeight).observe(document.documentElement);
  }
  // Backup: kör vid load + var 500ms i 5s ifall ResizeObserver missar något
  window.addEventListener("load", reportHeight);
  let n = 0;
  const ivl = setInterval(() => { reportHeight(); if (++n >= 10) clearInterval(ivl); }, 500);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(EnergiKalkylator));
  </script>
</body>
</html>
