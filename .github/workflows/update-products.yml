name: Uppdatera energiprodukter

on:
  # Körs varje måndag 06:00 UTC (= 07:00 svensk vintertid, 08:00 sommartid)
  schedule:
    - cron: '0 6 * * 1'
  
  # Tillåt manuell körning från Actions-fliken — användbart om man vill
  # ladda om feeden direkt efter att en ny produkt lanserats
  workflow_dispatch:

permissions:
  contents: write

# Förhindrar att två körningar krockar
concurrency:
  group: update-products
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Hämta och filtrera produkter
        run: node update-products.mjs

      - name: Commit & push om något ändrats
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add produkter.json
          if git diff --staged --quiet; then
            echo "Inga ändringar att committa."
          else
            git commit -m "chore: uppdatera produkter.json [skip ci]"
            git push
          fi
